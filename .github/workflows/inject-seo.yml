name: Inject SEO Tags

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'seo-head.html'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inject-seo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject SEO into index.html
        run: |
          python3 - <<'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          with open('seo-head.html', 'r', encoding='utf-8') as f:
              seo = f.read()

          # Remove any previously injected SEO block (keeps it idempotent)
          content = re.sub(r'<!-- SEO START -->.*?<!-- SEO END -->', '', content, flags=re.DOTALL)

          # Remove the bare title in index.html so ours is the only one
          content = re.sub(r'\s*<title>Growth Engines</title>', '', content)

          # Inject right after <head>
          content = content.replace('<head>', '<head>\n' + seo, 1)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print('SEO tags injected successfully')
          PYEOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: auto-inject SEO tags [skip ci]"
          git push
