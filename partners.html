<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Our Partner Churches & Nonprofits | Growth Engines</title>
  <meta name="description" content="See the churches and nonprofits partnering with Growth Engines for fractional CFO and executive leadership services across the United States." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://growthengines.com/partners" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://growthengines.com/partners" />
  <meta property="og:site_name" content="Growth Engines" />
  <meta property="og:title" content="Our Partner Churches & Nonprofits | Growth Engines" />
  <meta property="og:description" content="See the churches and nonprofits partnering with Growth Engines for fractional CFO and executive leadership services across the United States." />
  <meta property="og:image" content="https://growthengines.com/logo.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Our Partner Churches & Nonprofits | Growth Engines" />
  <meta name="twitter:description" content="See the churches and nonprofits partnering with Growth Engines across the United States." />
  <meta name="twitter:image" content="https://growthengines.com/logo.png" />

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Our Partner Churches & Nonprofits",
    "description": "See the churches and nonprofits partnering with Growth Engines for fractional CFO and executive leadership services across the United States.",
    "url": "https://growthengines.com/partners",
    "isPartOf": { "@id": "https://growthengines.com/#website" },
    "about": { "@id": "https://growthengines.com/#organization" }
  }
  </script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Fonts (matching main site) -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Tokens ── */
    :root {
      --gold: #F5BB1D;
      --gold-light: #f7cb4e;
      --black: #0a0a0a;
      --dark: #111111;
      --dark-card: #1a1a1a;
      --gray-text: #a0a0a0;
      --white: #ffffff;
      --font-heading: 'Barlow Condensed', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--gold-light); }

    /* ── Nav Bar ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--black);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .nav-logo-text {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 1;
    }
    .nav-logo-text span { display: block; }
    .nav-cta {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--black);
      background: var(--gold);
      padding: 0.6rem 1.5rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--gold-light); color: var(--black); }
    .nav-back {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1>Our <span class="gold">Partners</span></h1>
    <p>We don't consult from a distance. We embed as an integrated partner in the churches and nonprofits we serve across the country.</p>
    <div class="partner-count" id="partner-count"></div>
  </section>

  <!-- Map -->
  <section class="map-wrapper">
    <div id="map"></div>
  </section>

  <!-- CTA -->
  <section class="cta-section">
    <h2>Ready to <span style="color: var(--gold);">grow</span>?</h2>
    <p>See if your church or nonprofit is a fit for the Growth Engines partner model.</p>
    <a href="mailto:blake@growthengines.com" class="cta-btn">Schedule a Call</a>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Growth Engines. All rights reserved. &nbsp;|&nbsp; <a href="https://growthengines.com">Back to Home</a></p>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ── Initialize Map ──
    const map = L.map('map', {
      center: [35.5, -90],
      zoom: 4.5,
      zoomControl: true,
      scrollWheelZoom: true,
      attributionControl: true
    });

    // Dark tile layer (free, no API key)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ── Custom gold marker icon ──
    const goldIcon = L.divIcon({
      className: '',
      html: '<div class="ge-marker"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9],
      popupAnchor: [0, -14]
    });

    // ── Load Partners from JSON ──
    fetch('/partners.json')
      .then(res => res.json())
      .then(partners => {
        // Update counter
        document.getElementById('partner-count').textContent =
          partners.length + ' Partner' + (partners.length !== 1 ? 's' : '') + ' Nationwide';

        // Add markers
        partners.forEach(p => {
          const quoteHTML = p.quote
            ? `<div class="popup-quote">${p.quote}</div>`
            : '';

          const popupHTML = `
            <div class="popup-card">
              <div class="popup-church">${p.church}</div>
              <div class="popup-location">${p.city}, ${p.state}</div>
              ${quoteHTML}
              <div class="popup-person">${p.person}</div>
              <div class="popup-title">${p.title}</div>
            </div>
          `;

          L.marker([p.lat, p.lng], { icon: goldIcon })
            .addTo(map)
            .bindPopup(popupHTML, {
              maxWidth: 320,
              closeButton: true
            });
        });

        // Fit map to show all markers with padding
        const group = L.featureGroup(
          partners.map(p => L.marker([p.lat, p.lng]))
        );
        map.fitBounds(group.getBounds().pad(0.3));
      })
      .catch(err => {
        console.error('Error loading partners:', err);
      });
  </script>

</body>
</html>
